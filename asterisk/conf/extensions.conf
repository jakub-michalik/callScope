[callscope]
; emergency number -> answer + a short in-call playback (real RTP), then hang up
exten => 112,1,Answer()
 same  => n,Playback(demo-congrats)
 same  => n,Wait(6)
 same  => n,Hangup()

; an echo test number (you hear your own audio back over real RTP)
exten => 600,1,Answer()
 same  => n,Echo()
 same  => n,Hangup()

; demo a REAL SIP failure: dial 503 -> congestion (5xx), dial 486 -> busy
exten => 503,1,Congestion(5)
exten => 486,1,Busy(5)

; ring the registered softphone (Linphone). CallScope dials 700 -> your phone rings;
; answer it for a two-way call bridged by Asterisk (CallScope <-> Asterisk <-> phone).
exten => 700,1,Dial(PJSIP/phone,30)
 same  => n,Hangup()

; ring CallScope itself (native UAS auto-answers). Dial 500 from the phone -> CallScope picks up.
exten => 500,1,Dial(PJSIP/callscope,30)
 same  => n,Hangup()

; anything else -> 404
exten => _X.,1,Hangup(1)
