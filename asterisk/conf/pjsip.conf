[transport-udp]
type=transport
protocol=udp
; Bind to 5062 (NOT the default 5060): if a host Asterisk/SIP service already
; owns 5060, sharing it silently steals all traffic. Point CallScope here with
; CALLSCOPE_SIP_PORT=5062.
bind=0.0.0.0:5062

; --- endpoint CallScope authenticates as (user/pass callscope/callscope) ---
[callscope]
type=endpoint
context=callscope
disallow=all
allow=ulaw,alaw
auth=callscope-auth
aors=callscope

[callscope-auth]
type=auth
auth_type=userpass
username=callscope
password=callscope
realm=asterisk

[callscope]
type=aor
max_contacts=1
remove_existing=yes
; static contact = the native UAC's listen port, so Asterisk can route inbound calls
; to CallScope (it answers but does not REGISTER). Dial 500 to ring it (extensions.conf).
contact=sip:callscope@127.0.0.1:5070

; also identify by source IP so calls map to this endpoint even before REGISTER
[callscope-identify]
type=identify
endpoint=callscope
match=127.0.0.1

; --- a softphone (Linphone on your phone) registers here: user/pass phone/phone ---
; Register Linphone to  sip:phone@<PC-LAN-IP>:5062  (UDP). Then it can dial 600/112,
; and CallScope can ring it by dialing 700 (see extensions.conf).
[phone]
type=endpoint
context=callscope
disallow=all
allow=ulaw,alaw
auth=phone-auth
aors=phone
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
direct_media=no

[phone-auth]
type=auth
auth_type=userpass
username=phone
password=phone

[phone]
type=aor
max_contacts=1
remove_existing=yes
