name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # tags + history are needed for versioned docs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r docs/requirements.txt

      - name: Build all documentation versions
        run: |
          set -eu
          SITE="$GITHUB_WORKSPACE/_site"
          rm -rf "$SITE"; mkdir -p "$SITE"

          # "latest" = current main, served at the Pages root
          sphinx-build -b html docs "$SITE"

          # each release tag in its own subdirectory
          BUILT=""
          for t in $(git tag -l 'v*' | sort -V); do
            git worktree add --detach "/tmp/wt-$t" "$t"
            if ( cd "/tmp/wt-$t" && sphinx-build -b html docs "$SITE/$t" ); then
              BUILT="$BUILT $t"
            else
              echo "::warning::documentation build failed for $t — skipping"
            fi
            git worktree remove --force "/tmp/wt-$t" || true
          done

          # versions.json (latest + successfully-built tags, newest first)
          {
            echo '['
            echo '  {"name": "latest", "url": "/callScope/"}'
            for t in $(echo $BUILT | tr ' ' '\n' | sort -rV); do
              echo "  ,{\"name\": \"$t\", \"url\": \"/callScope/$t/\"}"
            done
            echo ']'
          } > "$SITE/versions.json"
          cat "$SITE/versions.json"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
